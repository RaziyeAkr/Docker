stages:
- build
- pull_and_scan

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE
  SCAN_LOG_FILE: "trivy-scan.log"

build_image:
  stage: build
  script:
  - echo "Building Docker image..."
  - docker build -t $IMAGE_TAG .
  - echo "Pushing image to GitLab Container Registry..."
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker push $IMAGE_TAG

security_scan:
  stage: pull_and_scan
  image: docker.arvancloud.ir/aquasec/trivy:latest
  needs:
  - build_image
  script:
  - echo "Logging in to GitLab Container Registry..."
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - echo "Pulling image $IMAGE_TAG"
  - docker pull $IMAGE_TAG
  - echo "Scanning the pulled image for critical vulnerabilities..."
  - trivy image --severity CRITICAL --exit-code 1 $IMAGE_TAG > $SCAN_LOG_FILE
  - echo "Scan results saved to $SCAN_LOG_FILE."
  artifacts:
    paths:
    - $SCAN_LOG_FILE
    expire_in: 1 week

